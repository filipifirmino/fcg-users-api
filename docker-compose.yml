services:
  users-postgres:
    image: postgres:16
    container_name: fcg_users_postgres
    environment:
      POSTGRES_USER: postgree
      POSTGRES_PASSWORD: postgree
      POSTGRES_DB: fcg_users
    ports:
      - "5433:5432"
    volumes:
      - users_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fcg_users_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped

volumes:
  users_postgres_data: